<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Equipamento</title>
</head>
<body>
    <button onclick="history.back()">⬅ Voltar</button>
    
    <h1>Editar Equipamento</h1>
    <p>Altere os dados do equipamento.</p>

    <form action="/equipamentos/editar/{{ equipamento[0] }}" method = "POST">

        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" value="{{ equipamento[1] }}" required>

        <br><br>

        <label for="setor">Setor:</label>
        <input type="text" id="setor" name="setor" value="{{ equipamento[2] }}" required>

        <br><br>

        <label for="descricao">Descrição:</label>
        <input type="text" id="descricao" name="descricao" value="{{ equipamento[3] }}" required>

        <br><br>

        <button type="submit">Salvar Alterações</button>

    </form>
    
</body>
</html>
