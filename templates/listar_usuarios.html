<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listar Usuários</title>
</head>
<body>
   <table>
    <tr>
        <th>Nome</th>
        <th>Setor</th>
        <th>Contato</th>
        <th>Email</th>
        <th>Ações</th>
    </tr>

    {% for usuario in usuarios %}
    <tr>
        <td>{{ usuario[1] }}</td>
        <td>{{ usuario[2] }}</td>
        <td>{{ usuario[3] }}</td>
        <td>{{ usuario[4] }}</td>

        <td>
            <a href="/usuarios/editar/{{ usuario[0] }}">
                Editar
            </a>
            <form action="/usuarios/deletar/{{ usuario[0] }}" method="POST" style="display:inline;">
                <button type="submit" onclick="return confirm('Tem certeza que deseja excluir este usuário?')">
                    Deletar</button>
            </form>
        </td>
    </tr>
    {% endfor %}

</table>
</body>
</html>
